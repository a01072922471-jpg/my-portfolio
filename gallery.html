<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안치영의 자동화 갤러리</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; }
        .navbar { background: white; height: 60px; display: flex; justify-content: center; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-container { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .nav-logo { font-weight: bold; text-decoration: none; color: #ff5733; font-size: 1.2rem; }
        
        /* 갤러리 그리드 레이아웃 */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }

        .work-item {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .work-item:hover { transform: translateY(-10px); }
        .work-item img { width: 100%; height: 250px; object-fit: cover; }
        .work-info { padding: 20px; }
        .work-info h2 { color: #333; font-size: 1.2rem; margin: 0 0 10px 0; }
        .work-info p { color: #666; font-size: 0.9rem; line-height: 1.6; margin: 0; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">← 안치영 포트폴리오</a>
        </div>
    </nav>

    <div class="gallery-container" id="galleryGrid"></div>

    <script>
        // ★ 이 부분이 안치영 님의 '작품 관리 대장'입니다!
        // 새로운 작품이 생기면 아래 { } 덩어리 하나만 복사해서 추가하면 됩니다.
        const myWorks = [
            {
                title: "슬픈연가",
                desc: "이 작품은 코딩과 예술의 조화를 생각하며 만들었습니다.",
                img: "슬픈연가.jpg"
            },
            {
                title: "무희의 무상",
                desc: "푸른 색조를 사용하여 고요하고 슬픈 감정을 표현했습니다.",
                img: "무희의 무상.jpg"
                
            },
            {
                title: "잃어버린시간",
                desc: "파이썬 분석 결과를 시각화한 현대적인 작품입니다.",
                img: "잃어버린시간.jpg"
            }
        ];

        // 대장에 적힌 목록을 화면에 자동으로 그려주는 마법의 코드
        const grid = document.getElementById('galleryGrid');
        
        myWorks.forEach(work => {
            const card = `
                <div class="work-item">
                    <img src="${work.img}" alt="${work.title}">
                    <div class="work-info">
                        <h2>${work.title}</h2>
                        <p>${work.desc}</p>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });
    </script>

</body>
</html>
