<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안치영의 포트폴리오</title>
    <style>
        /* 1. 기본 설정 */
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
        }

        /* 2. 헤더 (배경 이미지 영역) */
        header {
            background-image: linear-gradient(rgba(117, 5, 5, 0.5), rgba(0, 0, 0, 0.5)), url('back1.jpg');
            background-size: cover;
            background-position: center;
            height: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        header img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            margin-bottom: 20px;
            object-fit: cover;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 10px 0;
        }

        /* 3. 버튼 디자인 */
        .btn {
            display: inline-block;
            background-color: #ff5733;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s ease;
        }

        .btn:hover {
            background-color: #e44d26;
            transform: scale(1.05);
        }

        /* 4. 섹션 공통 스타일 */
        section {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        h2 {
            font-size: 2rem;
            border-bottom: 2px solid #ff5733;
            display: inline-block;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        /* 5. 프로젝트 카드 레이아웃 */
        .project-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .project-card {
            background: white;
            border: 1px solid #ddd;
            padding: 25px;
            border-radius: 15px;
            width: 300px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .project-card:hover {
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* 6. 푸터 (맨 하단) */
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 30px 0;
            margin-top: 80px;
        }
    </style>
</head>
<body>

    <header>
        <img src="port1.jpg" alt="안치영 프로필">
        <h1>안녕하세요, 안치영입니다!</h1>
        <p>코딩을 배우며 성장하는 중입니다.</p>
        <a href="#" class="btn">제 작업물 보기</a>
    </header>

    <section id="about">
        <h2>About Me</h2>
        <p>파이썬과 웹 기술에 관심이 많은 열정적인 학습자입니다.<br>
           현재 나만의 갤러리 포트폴리오 사이트를 직접 코딩하며 만들어가고 있습니다.</p>
    </section>

    <section id="projects">
        <h2>My Projects</h2>
        <div class="project-container">
            <div class="project-card">
                <h3>프로젝트 1: 첫 웹사이트</h3>
                <p>HTML과 CSS를 공부하며 만든 첫 번째 결과물입니다.</p>
            </div>
            <div class="project-card">
                <h3>프로젝트 2: 데이터 분석</h3>
                <p>파이썬을 활용해 데이터를 수집하고 시각화하는 연습을 하고 있습니다.</p>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 안치영. All rights reserved.</p>
    </footer>

</body>
</html>
